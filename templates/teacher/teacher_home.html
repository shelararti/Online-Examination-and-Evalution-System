<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background-color: #121212;
    color: #fff;
  }
  .navbar-dark .navbar-nav .nav-link.active {
    color: #5b42f3;
  }
  .list-group-item {
    background-color: #1e1e1e;
    color: #fff;
    border: 1px solid #333;
  }
  .modal-content {
    background-color: #1e1e1e;
    color: #fff;
  }
  .form-control.bg-dark {
    background-color: #2c2c2c;
    color: #fff;
  }
  .btn-primary {
    background-color: #5b42f3;
    border-color: #5b42f3;
  }
  .btn-primary:hover {
    background-color: #3f2bb5;
    border-color: #3f2bb5;
  }
  .btn-info {
    background-color: #17a2b8;
    border-color: #17a2b8;
  }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('teacher_home') }}">Teacher Panel</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="{{ url_for('teacher_home') }}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('teacher_view_score') }}">Score</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('teacher_logout') }}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <h2>Welcome, Teacher!</h2>

  <!-- Add Test Form -->
  <form method="POST" action="{{ url_for('teacher_home') }}" class="mt-4 mb-3">
    <div class="input-group">
      <input type="text" name="test_name" class="form-control bg-dark" placeholder="Enter Test Name" required>
      <button type="submit" name="add_test_name" class="btn btn-primary">Add Test</button>
    </div>
  </form>

  <!-- Tests List -->
  <h3 class="mt-4">Your Tests:</h3>
  <ul class="list-group">
    {% for test in tests %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <a href="{{ url_for('view_teacher_test_questions', test_id=test[0]) }}" class="text-white">{{ test[1] }}</a>
      <div class="btn-group">
        <button type="button" class="btn btn-info" data-bs-toggle="modal" data-bs-target="#editTestModal{{ test[0] }}">Edit</button>
        <form method="POST" action="{{ url_for('teacher_home') }}">
          <input type="hidden" name="test_id" value="{{ test[0] }}">
          <button type="submit" name="delete_test_name" class="btn btn-danger">Delete</button>
        </form>
      </div>
    </li>

    <!-- Edit Test Modal -->
    <div class="modal fade" id="editTestModal{{ test[0] }}" tabindex="-1" aria-labelledby="editTestModalLabel{{ test[0] }}" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editTestModalLabel{{ test[0] }}">Edit Test Name</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form method="POST" action="{{ url_for('teacher_home') }}">
              <input type="hidden" name="test_id" value="{{ test[0] }}">
              <div class="form-group">
                <input type="text" name="updated_test_name" class="form-control bg-dark" value="{{ test[1] }}" required>
              </div>
              <button type="submit" name="update_test_name" class="btn btn-primary mt-2">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    {% endfor %}
  </ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
