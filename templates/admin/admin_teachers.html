<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Teachers</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        h2 {
            margin-bottom: 20px;
        }
        .table-dark-custom {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            backdrop-filter: blur(5px);
            color: white;
        }
        .table-dark-custom th,
        .table-dark-custom td {
            vertical-align: middle;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('admin_home') }}">Admin Panel</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" 
                data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" 
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_home') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_teachers') }}">Teachers</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_students') }}">Students</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_logout') }}">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Container -->
<div class="container mt-5">
    <h2>Admin Teachers</h2>
    <div class="mb-3">
        <a href="{{ url_for('add_teacher') }}" class="btn btn-success">Add Teacher</a>
    </div>

    <!-- Teachers Table -->
    <table class="table table-bordered table-dark-custom mt-3">
        <thead>
            <tr>
                <th>Teacher ID</th>
                <th>Username</th>
                <th>Password</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for teacher in teachers %}
            <tr>
                <td>{{ teacher[0] }}</td>
                <td>{{ teacher[1] }}</td>
                <td>{{ teacher[2] }}</td>
                <td>
                    <a href="{{ url_for('view_teacher_tests', teacher_id=teacher[0]) }}" class="btn btn-info btn-sm">View Tests</a>
                    <a href="{{ url_for('update_teacher', teacher_id=teacher[0]) }}" class="btn btn-warning btn-sm">Update</a>
                    <form action="{{ url_for('delete_teacher', teacher_id=teacher[0]) }}" method="post" style="display:inline-block;">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('admin_home') }}" class="btn btn-primary mt-3">Back to Admin Home</a>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
