<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Login | AES_ai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background-color: #121212;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Open Sans', sans-serif;
        }

        .login-card {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            width: 850px;
            max-width: 95%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .cover {
            width: 50%;
            background: url('{{ url_for("static", filename="images/logo1animate.gif") }}') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
        }

        .cover-text {
            position: relative;
            text-align: center;
            color: #fff;
            z-index: 1;
        }

        .cover-text h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .login-form {
            width: 50%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form .form-control {
            background-color: #1e1e1e;
            border: 1px solid #444;
            color: #fff;
        }

        .login-form .form-control:focus {
            border-color: #5B42F3;
            box-shadow: 0 0 0 0.2rem rgba(91,66,243,0.25);
            background-color: #1e1e1e;
            color: #fff;
        }

        .login-btn {
            background: linear-gradient(144deg, #AF40FF, #5B42F3 50%, #00DDEB);
            border: none;
            padding: 12px 0;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: scale(1.05);
        }

        .alert-danger {
            background-color: #8B0000;
            border-color: #700000;
            color: #fff;
        }

        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
            }
            .cover, .login-form {
                width: 100%;
            }
            .cover {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="cover">
        <div class="cover-text">
            <h1>Every login is a step <br> towards knowledge</h1>
            <p>Teacher Login</p>
        </div>
    </div>

    <div class="login-form">
        <h2 class="mb-4">Login</h2>
        <form method="POST" action="{{ url_for('teacher_login') }}">
            <div class="mb-3 position-relative">
                <i class="fa fa-user position-absolute" style="top: 12px; left: 10px; color: #5B42F3;"></i>
                <input type="text" name="username" class="form-control ps-5" placeholder="Username" required>
            </div>
            <div class="mb-3 position-relative">
                <i class="fa fa-lock position-absolute" style="top: 12px; left: 10px; color: #5B42F3;"></i>
                <input type="password" name="password" class="form-control ps-5" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        {% if error %}
        <div class="alert alert-danger mt-3">
            {{ error }}
        </div>
        {% endif %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
