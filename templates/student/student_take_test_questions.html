<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Take Test</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Optional: Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      background-color: #121212;
      color: #fff;
    }
    .card {
      background-color: #1e1e1e;
      border: none;
    }
    .form-control {
      background-color: #2c2c2c;
      color: #fff;
      border: 1px solid #444;
    }
    .form-control:focus {
      background-color: #2c2c2c;
      color: #fff;
      border-color: #5b42f3;
      box-shadow: none;
    }
    .btn-primary {
      background-color: #5b42f3;
      border: none;
    }
    .btn-primary:hover {
      background-color: #3a1fc3;
    }
    .navbar-dark .navbar-nav .nav-link.active {
      color: #5b42f3;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Student Panel</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('student_logout') }}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main container -->
<div class="container mt-5">
  <h2 class="text-center mb-4">Take Test</h2>
  <form method="POST" action="{{ url_for('student_submit_test') }}">
    {% for question in questions %}
      <div class="card mb-4 shadow-sm">
        <div class="card-header">
          <strong>Question ID:</strong> {{ question[0] }}
        </div>
        <div class="card-body">
          <h5 class="card-title">Question:</h5>
          <p class="card-text">{{ question[1] }}</p>
          <div class="mb-3">
            <label for="answer{{ question[0] }}" class="form-label">Your Answer:</label>
            <input type="text" class="form-control" id="answer{{ question[0] }}" 
                   name="question_{{ question[0] }}" placeholder="Enter your answer" required>
          </div>
        </div>
      </div>
    {% endfor %}
    <div class="text-center">
      <button type="submit" class="btn btn-primary btn-lg px-5">Submit Answers</button>
    </div>
  </form>
</div>

<!-- Bootstrap 5 JS Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
